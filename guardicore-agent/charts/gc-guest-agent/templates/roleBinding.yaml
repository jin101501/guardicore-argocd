kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: gc-agent-role-binding
  namespace: {{ .Values.gcNamespace | default .Values.global.gcNamespace}}
subjects:
- kind: ServiceAccount
  name: {{ .Values.gcServiceAccount | default .Values.global.gcServiceAccount}}
  namespace: {{ .Values.gcNamespace | default .Values.global.gcNamespace}}
roleRef:
  kind: Role
  name: gc-agent-role
  apiGroup: rbac.authorization.k8s.io
