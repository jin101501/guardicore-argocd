apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    rbac.authorization.kubernetes.io/autoupdate: "true"
  name: gc-agent-clusterrole
rules:
# RO permissions
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods", "nodes", "endpoints", "services", "replicationcontrollers", "events"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["security.openshift.io"]
  resources: ["securitycontextconstraints"]
  resourceNames: ["privileged"]
  verbs: ["use"]
- apiGroups: ["config.openshift.io"]
  resources: ["clusterversions"]
  verbs: ["get"]
- apiGroups: ["route.openshift.io"]
  resources: ["routes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["k8s.ovn.org"]
  resources: ["egressips"]
  verbs: ["get", "list", "watch"]
- apiGroups: [ "discovery.k8s.io" ]
  resources: [ "endpointslices" ]
  verbs: [ "get", "list", "watch" ]
- apiGroups: ["projectcalico.org"]
  resources: ["tiers"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["projectcalico.org"]
  resources: ["clusterinformations"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["extensions", "apps", "batch"]
  resources: ["deployments", "daemonsets", "replicasets", "statefulsets", "jobs", "cronjobs"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.aws"]
  resources: ["policyendpoints"]
  verbs: ["get", "list", "watch"]
# RW permissions
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["get", "list", "watch", "update"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "update", "list", "watch"]
- apiGroups: ["projectcalico.org"]
  resources: ["tier.networkpolicies", "tier.globalnetworkpolicies", "networkpolicies", "globalnetworkpolicies"]
  verbs: ["get", "list", "update", "watch"]
