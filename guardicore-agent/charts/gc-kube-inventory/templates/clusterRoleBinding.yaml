{{ if .Values.global.includeInventory }}
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: gc-role-binding-inventory
subjects:
- kind: ServiceAccount
  name: {{ .Values.gcServiceAccount | default .Values.global.gcServiceAccount}}
  namespace: {{ .Values.gcNamespace | default .Values.global.gcNamespace}}
roleRef:
  kind: ClusterRole
  name: gc-role-inventory
  apiGroup: rbac.authorization.k8s.io
{{ end }}
